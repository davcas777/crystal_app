command:
  - streamlit
  - run
  - app.py

env:
  # URL base de su AI Gateway (debe terminar en /ai-gateway/mlflow/v1)
  - name: AI_GATEWAY_BASE_URL
    value: "https://adb-520209755093735.15.azuredatabricks.net/ai-gateway/mlflow/v1"

  # Endpoints expuestos a los usuarios. Dos formatos soportados:
  #   Corto:    "gpt,claude"
  #   Completo: '[{"name":"gpt","label":"OpenAI GPT"},{"name":"claude","label":"Anthropic Claude"}]'
  - name: AI_GATEWAY_ENDPOINTS
    value: '[{"name":"gpt","label":"OpenAI GPT"},{"name":"claude","label":"Anthropic Claude"}]'

  # Máximo de tokens por respuesta
  - name: AI_GATEWAY_MAX_TOKENS
    value: "1024"

  # Ruta del historial de chat (SQLite). /tmp es efímero por pod.
  - name: CHAT_HISTORY_DB_PATH
    value: "/tmp/crystal_chat_history.db"
